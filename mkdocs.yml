    - Manifests & Helm: manifests-and-helm.md
    - OpenTofu State Migration (S3): tf-state-s3-migration.md
  - Services:
    - Adding a New Service: new-service.md
    - AdGuard Home: adguard.md
    - Authentik SSO: authentik.md
    - Calibre-Web: calibre-web.md
    - Dashy Dashboard: dashy.md
    - Fail2ban: fail2ban.md
    - Jellyfin Media Suite: jellyfin.md
    - Ntfy: ntfy.md
    - Stalwart Email: stalwart-email.md
    - Uptime Kuma: uptime-kuma.md
  - Monitoring:
    - Monitoring (Prometheus + Grafana): monitoring.md
  - Networking:
    - Tailscale Operator: tailscale-operator.md
    - Cloudflare Tunnels: cloudflare-tunnels.md
    - Flannel over Tailscale: flannel-over-tailscale.md
  - Network Lab:
