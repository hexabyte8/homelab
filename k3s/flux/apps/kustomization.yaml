---
# Bundle of every per-service Flux Kustomization / HelmRelease.
# Reconciled by the root `apps` Kustomization in
# ../clusters/k3s/apps.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespaces.yaml
  # Helm-based infrastructure
  - cert-manager.yaml
  - cnpg-operator.yaml
  - falco.yaml
  - longhorn-operator.yaml
  - loki.yaml
  - monitoring.yaml
  - tailscale-operator.yaml
  - authentik.yaml
  # Plain-manifest infrastructure config
  - cert-manager-config.yaml
  - longhorn-config.yaml
  - tailscale-config.yaml
  - authentik-config.yaml
  - traefik-config.yaml
  - cloudflared.yaml
  - metallb-config.yaml
  - monitoring-config.yaml
  - monitoring-manifests.yaml
  # Workloads
  - adguard.yaml
  - calibre-web.yaml
  - dashy.yaml
  - fail2ban.yaml
  - jellyfin.yaml
  - librechat.yaml
  - mcp-kubernetes.yaml
  - ntfy.yaml
  - ollama.yaml
  - stalwart.yaml
  - uptime-kuma.yaml
