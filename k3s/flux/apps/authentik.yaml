---
# The Authentik chart provisions Postgres via a CNPG `Cluster` CR (created
# from the chart-templated resources combined with `authentik-config`), so
# the CNPG operator must be installed first.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: flux-system
spec:
  interval: 30m
  releaseName: authentik
  targetNamespace: authentik
  dependsOn:
    - name: cnpg-operator
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: authentik
      version: 2026.2.2
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      secret_key: "PLACEHOLDER_overridden_by_env"
      postgresql:
        host: "authentik-db-rw.authentik.svc.cluster.local"
        port: 5432
        name: "app"
        user: "app"
      redis:
        host: "authentik-redis-master"
      email:
        host: "stalwart.stalwart.svc.cluster.local"
        port: 587
        username: "noreply"
        use_tls: false
        use_ssl: false
        timeout: 30
        from: "authentik <noreply@chronobyte.net>"

    global:
      env:
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: secret-key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-db-app
              key: password
        - name: AUTHENTIK_BOOTSTRAP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: bootstrap-password
        - name: AUTHENTIK_BOOTSTRAP_EMAIL
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: bootstrap-email
        - name: AUTHENTIK_EMAIL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: authentik-credentials
              key: smtp-password

    postgresql:
      enabled: false

    redis:
      enabled: false

    server:
      ingress:
        enabled: false

    worker: {}
