---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitea
  namespace: flux-system
spec:
  interval: 30m
  releaseName: gitea
  targetNamespace: gitea
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: gitea
      version: 10.6.0
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
  values:
    replicaCount: 1

    gitea:
      admin:
        existingSecret: gitea-admin-credentials
      config:
        server:
          DOMAIN: git.chronobyte.net
          ROOT_URL: https://git.chronobyte.net
          SSH_DOMAIN: git.chronobyte.net
          SSH_PORT: 22
          SSH_LISTEN_PORT: 2222
        database:
          DB_TYPE: sqlite3
        session:
          PROVIDER: db
        cache:
          ADAPTER: memory
        queue:
          TYPE: level

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: ClusterIP
        port: 22
        targetPort: 2222

    persistence:
      enabled: true
      existingClaim: gitea-data

    postgresql:
      enabled: false

    postgresql-ha:
      enabled: false

    redis-cluster:
      enabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
