---
# MetalLB itself is installed by the k3s bootstrap; this only ships the IPAddressPool / L2Advertisement CRs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s/manifests/metallb
  targetNamespace: metallb-system
