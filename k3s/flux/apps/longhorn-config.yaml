---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-config
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  timeout: 5m
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k3s/manifests/longhorn
  targetNamespace: longhorn-system
  # longhorn-operator is a HelmRelease; Kustomization dependsOn only supports
  # Kustomization-kind dependencies, so retries handle CRD readiness.
