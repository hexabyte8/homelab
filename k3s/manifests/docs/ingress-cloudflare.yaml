apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docs-cloudflare
  namespace: docs
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    # cloudflare-https-scheme MUST come first: cloudflared connects over http,
    # so without rewriting X-Forwarded-Proto Authentik builds http:// callback
    # URLs and the ForwardAuth round-trip fails.
    traefik.ingress.kubernetes.io/router.middlewares: >-
      kube-system-cloudflare-https-scheme@kubernetescrd,authentik-authentik-forward-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: docs.chronobyte.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docs
                port:
                  number: 8000
  tls:
    - hosts:
        - docs.chronobyte.net
      secretName: docs-cloudflare-tls
