apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs
  namespace: docs
  labels:
    app: docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs
  template:
    metadata:
      labels:
        app: docs
    spec:
      initContainers:
        # Initial clone so the repo is available before zensical starts
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          args:
            - --repo=https://github.com/hexabyte8/homelab.git
            - --ref=main
            - --root=/git
            - --link=repo
            - --one-time
          env:
            - name: GITSYNC_USERNAME
              value: "x-access-token"
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: git-sync-credentials
                  key: token
          volumeMounts:
            - name: git-data
              mountPath: /git
      containers:
        # Continuous git-sync sidecar — polls every 60s
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.4.0
          args:
            - --repo=https://github.com/hexabyte8/homelab.git
            - --ref=main
            - --root=/git
            - --link=repo
            - --period=60s
          env:
            - name: GITSYNC_USERNAME
              value: "x-access-token"
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: git-sync-credentials
                  key: token
          volumeMounts:
            - name: git-data
              mountPath: /git
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        # Zensical docs server — serves from the synced repo
        - name: zensical
          image: zensical/zensical:latest
          args:
            - serve
            - --dev-addr=0.0.0.0:8000
          workingDir: /git/repo  # git-sync maintains this symlink → current worktree
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: git-data
              mountPath: /git  # mount the full git volume, not subPath (subPath breaks symlinks)
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: git-data
          emptyDir: {}

