apiVersion: v1
kind: Secret
metadata:
  name: mcp-proxmox-secrets
  namespace: mcp-proxmox
type: Opaque
stringData:
  # ProxmoxMCP-Plus reads its configuration from /app/proxmox-config/config.json.
  # This placeholder gets the pod into a runnable state; replace the real values
  # live with `kubectl patch --type=merge` (ArgoCD ignoreDifferences keeps it).
  # See: https://github.com/RekklesNA/ProxmoxMCP-Plus/blob/main/proxmox-config/config.example.json
  #
  # Notes on values below:
  #   - transport=STREAMABLE makes FastMCP serve the streamable-HTTP MCP
  #     endpoint at /mcp on mcp.host:mcp.port. This is what Copilot's
  #     `type: http` MCP client expects.
  #   - jobs.sqlite_path lives under /tmp on purpose: long-running job state is
  #     intentionally ephemeral here (no PVC). Point this at a mounted volume
  #     if persistence across pod restarts becomes a requirement.
  config.json: |
    {
      "proxmox": {
        "host": "REPLACE_ME_proxmox_host_or_ip",
        "port": 8006,
        "verify_ssl": false,
        "service": "PVE"
      },
      "auth": {
        "user": "REPLACE_ME_user@pam",
        "token_name": "REPLACE_ME_token_name",
        "token_value": "REPLACE_ME_token_uuid"
      },
      "logging": {
        "level": "INFO",
        "format": "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
      },
      "mcp": {
        "host": "0.0.0.0",
        "port": 8811,
        "transport": "STREAMABLE"
      },
      "security": {
        "dev_mode": true
      },
      "jobs": {
        "sqlite_path": "/tmp/proxmox-jobs.sqlite3"
      }
    }
