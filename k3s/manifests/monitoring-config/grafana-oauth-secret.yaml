apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth-secret
  namespace: monitoring
type: Opaque
stringData:
  # Obtain these from the Authentik UI after creating the OAuth2/OIDC provider.
  # See docs/monitoring.md — "Authentik SSO Setup" for step-by-step instructions.
  # Patch with:
  #   kubectl patch secret grafana-oauth-secret -n monitoring --type=merge \
  #     -p '{"stringData":{"GF_AUTH_GENERIC_OAUTH_CLIENT_ID":"<id>","GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET":"<secret>"}}'
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "REPLACE_ME"
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "REPLACE_ME"
