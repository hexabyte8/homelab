# Placeholder Secret for Transmission + OpenVPN credentials.
#
# DO NOT commit real credentials or .ovpn config contents to source control.
#
# This Secret holds REPLACE_ME placeholders only. The real values are patched
# in-cluster live by the `.github/workflows/k3s-patch-secrets.yml` GitHub
# Actions workflow, which loads them from Bitwarden Secrets Manager and runs
# `kubectl patch` against this Secret. Run that workflow with target
# `transmission-openvpn-credentials` (or `all`) after a fresh apply / disaster
# recovery / credential rotation.
#
# The `kustomize.toolkit.fluxcd.io/reconcile: disabled` annotation tells
# ArgoCD/Flux to leave this object alone after creation, so subsequent
# reconciles will not overwrite the live patched values with these
# placeholders. ArgoCD apps that sync this manifest also use
# `ignoreDifferences` + `RespectIgnoreDifferences=true` to honor that.
#
# Required keys (patched live):
#   vpn.ovpn                  - Full contents of the AirVPN .ovpn config file.
#                               AirVPN embeds certificates and credentials inside
#                               the file, so no separate username/password is needed.
#                               Generate the config at: https://airvpn.org/generator/
#   TRANSMISSION_RPC_USERNAME - Transmission web UI username
#   TRANSMISSION_RPC_PASSWORD - Transmission web UI password (auto-hashed on start)
apiVersion: v1
kind: Secret
metadata:
  name: transmission-openvpn-credentials
  namespace: jellyfin
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
type: Opaque
stringData:
  vpn.ovpn: "REPLACE_ME"
  TRANSMISSION_RPC_USERNAME: "REPLACE_ME"
  TRANSMISSION_RPC_PASSWORD: "REPLACE_ME"
