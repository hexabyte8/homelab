apiVersion: v1
kind: Secret
metadata:
  name: librechat-secrets
  namespace: librechat
type: Opaque
stringData:
  # Generate with: openssl rand -base64 32
  jwt-secret: "REPLACE_ME_openssl_rand_-base64_32"
  # Generate with: openssl rand -base64 32
  jwt-refresh-secret: "REPLACE_ME_openssl_rand_-base64_32"
  # Generate with: openssl rand -hex 32  (must be 64 hex chars / 32 bytes)
  creds-key: "REPLACE_ME_openssl_rand_-hex_32"
  # Generate with: openssl rand -hex 16  (must be 32 hex chars / 16 bytes)
  creds-iv: "REPLACE_ME_openssl_rand_-hex_16"
  # Pick a strong password and substitute into the URI below
  # Full connection URI — replace <password> with the actual password you choose
  mongo-uri: "mongodb://root:REPLACE_ME_strong_password@mongodb.librechat.svc.cluster.local:27017/librechat?authSource=admin"
  # Used by the MongoDB container itself to set the root password (must match the password in mongo-uri above)
  mongo-root-password: "REPLACE_ME_strong_password"
