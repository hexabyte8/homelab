apiVersion: apps/v1
kind: Deployment
metadata:
  name: librechat
  namespace: librechat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: librechat
  template:
    metadata:
      labels:
        app: librechat
    spec:
      containers:
        - name: librechat
          image: ghcr.io/danny-avila/librechat:v0.7.8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3080
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3080"
            # Public-facing URL used for cookie domain and redirect URIs
            - name: DOMAIN_CLIENT
              value: "https://librechat.chronobyte.net"
            - name: DOMAIN_SERVER
              value: "https://librechat.chronobyte.net"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: librechat-secrets
                  key: mongo-uri
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: librechat-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: librechat-secrets
                  key: jwt-refresh-secret
            - name: CREDS_KEY
              valueFrom:
                secretKeyRef:
                  name: librechat-secrets
                  key: creds-key
            - name: CREDS_IV
              valueFrom:
                secretKeyRef:
                  name: librechat-secrets
                  key: creds-iv
            # Config file path (mounted from ConfigMap below)
            - name: CONFIG_PATH
              value: "/app/librechat.yaml"
            # Disable built-in OpenAI/Anthropic/etc. endpoints — Ollama only
            - name: ENDPOINTS
              value: "custom"
            # Allow new account registration (set to false after first admin account created)
            - name: ALLOW_REGISTRATION
              value: "true"
            - name: ALLOW_SOCIAL_LOGIN
              value: "false"
            - name: ALLOW_SOCIAL_REGISTRATION
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /app/librechat.yaml
              subPath: librechat.yaml
              readOnly: true
            - name: uploads
              mountPath: /app/client/public/images
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: librechat-config
        - name: uploads
          persistentVolumeClaim:
            claimName: librechat-uploads
