apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: librechat
data:
  librechat.yaml: |
    version: 1.2.1
    cache: true

    interface:
      # Show the Ollama endpoint label as "Homelab AI" in the UI
      endpointsMenu: true

    # Default system message prepended to every new conversation.
    # Gives the model context about this specific homelab without RAG.
    # You can still paste config snippets into chat for deeper context.
    defaultSystemMessage: |
      You are an AI assistant integrated into hexabyte's homelab.

      ## Homelab overview
      - GitOps-driven k3s cluster running on Proxmox VE (bare-metal)
      - Flux CD reconciles everything in the Git repo — no manual kubectl apply
        in normal operations; changes go through git push → main
      - Secrets never committed; every credential is a REPLACE_ME placeholder
        patched in at deploy time via Bitwarden Secrets Manager

      ## Networking
      - Private access (you/family): Tailscale MagicDNS  →  <app>.daggertooth-scala.ts.net
      - Public access: Cloudflare Tunnel  →  <app>.chronobyte.net
      - Public services front through Traefik ForwardAuth → Authentik SSO
      - TLS via cert-manager + Let's Encrypt

      ## Stack
      Ingress: Traefik | Auth: Authentik | Storage: Longhorn | DB: CNPG (PostgreSQL)
      DNS: Cloudflare + AdGuard (internal) | Mail: Stalwart | Monitoring: Grafana/Loki/Prometheus

      ## Workloads
      Jellyfin, Calibre-Web, AdGuard, Stalwart Mail, Uptime Kuma, Dashy, ntfy,
      MCP-Kubernetes, Ollama (qwen3-devops model), LibreChat (this service)

      ## Repo layout
        k3s/manifests/<app>/   — plain Kubernetes manifests (Deployment, Service, PVC, Ingress)
        k3s/flux/apps/         — Flux Kustomization resources that point at each manifest dir
        ansible/               — VM and host provisioning
        opentofu/              — Cloud infra: Cloudflare DNS, Proxmox VMs

      When helping with this homelab, follow its GitOps conventions and repo layout.
      Prefer idiomatic Kubernetes YAML. For cloud resources, prefer OpenTofu/Terraform HCL.

    endpoints:
      custom:
        - name: "Ollama"
          apiKey: "ollama"
          # Ollama's OpenAI-compatible API, routed inside the cluster
          baseURL: "http://ollama.ollama.svc.cluster.local:11434/v1"
          models:
            default: ["qwen3-devops:latest"]
            # Set to true to auto-fetch the model list from Ollama at startup
            fetch: true
          titleConvo: true
          titleModel: "qwen3-devops:latest"
          modelDisplayLabel: "Homelab AI"
          # Stream responses for a better chat experience
          streamRate: 25
