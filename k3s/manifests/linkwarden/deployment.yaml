apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwarden
  namespace: linkwarden
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: linkwarden
  template:
    metadata:
      labels:
        app: linkwarden
    spec:
      containers:
        - name: linkwarden
          image: ghcr.io/linkwarden/linkwarden:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXTAUTH_URL
              value: "https://links.chronobyte.net/api/v1/auth"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: linkwarden-secrets
                  key: nextauth-secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: linkwarden-db-app
                  key: uri
            - name: MEILI_HOST
              value: "http://meilisearch.linkwarden.svc.cluster.local:7700"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: linkwarden-secrets
                  key: meili-master-key
            - name: MAX_WORKERS
              value: "1"
            - name: ARCHIVE_TAKE_COUNT
              value: "1"
            - name: AUTOSCROLL_TIMEOUT
              value: "10"
            - name: BROWSER_TIMEOUT
              value: "30000"
          volumeMounts:
            - name: data
              mountPath: /data/data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: linkwarden-data
