# Chatto app — no Authentik forward auth (Chatto manages its own auth)
# Add chat.chronobyte.net and livekit.chat.chronobyte.net as public hostnames
# in Cloudflare Zero Trust > Networks > Tunnels > your tunnel > Public Hostname.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatto-cloudflare
  namespace: chatto
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.middlewares: >-
      kube-system-cloudflare-https-scheme@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: chat.chronobyte.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chatto
                port:
                  number: 4000
  tls:
    - hosts:
        - chat.chronobyte.net
      secretName: chatto-cloudflare-tls
---
# LiveKit signaling (WebSocket) — proxied through Cloudflare tunnel
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: livekit-cloudflare
  namespace: chatto
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.middlewares: >-
      kube-system-cloudflare-https-scheme@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: livekit.chat.chronobyte.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: livekit
                port:
                  number: 7880
  tls:
    - hosts:
        - livekit.chat.chronobyte.net
      secretName: livekit-cloudflare-tls
