# Placeholder Secret — real values are patched live by the
# `.github/workflows/k3s-patch-secrets.yml` workflow via Bitwarden Secrets Manager.
# Run that workflow with target `chatto-config` (or `all`) after a fresh apply
# or credential rotation.
#
# The `kustomize.toolkit.fluxcd.io/reconcile: disabled` annotation tells Flux
# to leave this object alone after creation so subsequent reconciles do not
# overwrite the live-patched values with these placeholders.
#
# Required Bitwarden secret UUIDs (add to secrets-manifest.yml and the workflow):
#   CHATTO_NATS_TOKEN                      — openssl rand -hex 32
#   CHATTO_COOKIE_SIGNING_SECRET           — openssl rand -hex 32
#   CHATTO_COOKIE_ENCRYPTION_SECRET        — openssl rand -hex 32
#   CHATTO_CORE_SECRET_KEY                 — openssl rand -hex 32
#   CHATTO_CORE_ASSETS_SIGNING_SECRET      — openssl rand -hex 32
#   CHATTO_LIVEKIT_API_SECRET              — openssl rand -hex 32
#   CHATTO_SMTP_USERNAME
#   CHATTO_SMTP_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: chatto-config
  namespace: chatto
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
type: Opaque
stringData:
  # NATS_TOKEN and CHATTO_NATS_CLIENT_TOKEN must be identical
  NATS_TOKEN: "REPLACE_ME"
  CHATTO_NATS_CLIENT_TOKEN: "REPLACE_ME"

  CHATTO_OWNERS_EMAILS: "t.parnell96@icloud.com"
  CHATTO_NATS_EMBEDDED_ENABLED: "false"
  CHATTO_NATS_CLIENT_URL: "nats://nats:4222"
  CHATTO_NATS_CLIENT_AUTH_METHOD: "token"
  CHATTO_WEBSERVER_URL: "https://chat.chronobyte.net"
  CHATTO_WEBSERVER_PORT: "4000"
  CHATTO_WEBSERVER_COOKIE_SIGNING_SECRET: "REPLACE_ME"
  CHATTO_WEBSERVER_COOKIE_ENCRYPTION_SECRET: "REPLACE_ME"
  CHATTO_CORE_SECRET_KEY: "REPLACE_ME"
  CHATTO_CORE_ASSETS_SIGNING_SECRET: "REPLACE_ME"
  CHATTO_LOG_LEVEL: "info"
  CHATTO_LOG_FORMAT: "json"

  # LiveKit — API key name "chatto" is hardcoded in livekit-configmap.yaml
  CHATTO_LIVEKIT_ENABLED: "true"
  CHATTO_LIVEKIT_URL: "wss://livekit.chat.chronobyte.net"
  CHATTO_LIVEKIT_API_KEY: "chatto"
  CHATTO_LIVEKIT_API_SECRET: "REPLACE_ME"

  # SMTP via in-cluster Stalwart
  CHATTO_SMTP_ENABLED: "true"
  CHATTO_SMTP_HOST: "stalwart.stalwart.svc.cluster.local"
  CHATTO_SMTP_PORT: "587"
  CHATTO_SMTP_TLS: "mandatory"
  CHATTO_SMTP_USERNAME: "REPLACE_ME"
  CHATTO_SMTP_PASSWORD: "REPLACE_ME"
  CHATTO_SMTP_FROM: "noreply@chronobyte.net"
