apiVersion: v1
kind: Secret
metadata:
  name: chatto-config
  namespace: chatto
type: Opaque
stringData:
  # NATS token — NATS_TOKEN and CHATTO_NATS_CLIENT_TOKEN must be identical
  # Generate with: openssl rand -hex 32
  NATS_TOKEN: "REPLACE_ME_openssl_rand_-hex_32"
  CHATTO_NATS_CLIENT_TOKEN: "REPLACE_ME_same_value_as_NATS_TOKEN"

  # Chatto core
  CHATTO_OWNERS_EMAILS: "t.parnell96@icloud.com"
  CHATTO_NATS_EMBEDDED_ENABLED: "false"
  CHATTO_NATS_CLIENT_URL: "nats://nats:4222"
  CHATTO_NATS_CLIENT_AUTH_METHOD: "token"
  CHATTO_WEBSERVER_URL: "https://chat.chronobyte.net"
  CHATTO_WEBSERVER_PORT: "4000"
  # Generate each with: openssl rand -hex 32
  CHATTO_WEBSERVER_COOKIE_SIGNING_SECRET: "REPLACE_ME_openssl_rand_-hex_32"
  CHATTO_WEBSERVER_COOKIE_ENCRYPTION_SECRET: "REPLACE_ME_openssl_rand_-hex_32"
  CHATTO_CORE_SECRET_KEY: "REPLACE_ME_openssl_rand_-hex_32"
  CHATTO_CORE_ASSETS_SIGNING_SECRET: "REPLACE_ME_openssl_rand_-hex_32"
  CHATTO_LOG_LEVEL: "info"
  CHATTO_LOG_FORMAT: "json"

  # LiveKit — key name is hardcoded as "chatto" in livekit-configmap.yaml
  # CHATTO_LIVEKIT_API_SECRET must match the secret value in the LiveKit config
  CHATTO_LIVEKIT_ENABLED: "true"
  CHATTO_LIVEKIT_URL: "wss://livekit.chat.chronobyte.net"
  CHATTO_LIVEKIT_API_KEY: "chatto"
  CHATTO_LIVEKIT_API_SECRET: "REPLACE_ME_openssl_rand_-hex_32"

  # SMTP via Stalwart (in-cluster)
  CHATTO_SMTP_ENABLED: "true"
  CHATTO_SMTP_HOST: "stalwart.stalwart.svc.cluster.local"
  CHATTO_SMTP_PORT: "587"
  CHATTO_SMTP_TLS: "mandatory"
  CHATTO_SMTP_USERNAME: "REPLACE_ME_smtp_user@chronobyte.net"
  CHATTO_SMTP_PASSWORD: "REPLACE_ME_smtp_password"
  CHATTO_SMTP_FROM: "noreply@chronobyte.net"
