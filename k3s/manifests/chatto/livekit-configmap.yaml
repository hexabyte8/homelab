apiVersion: v1
kind: ConfigMap
metadata:
  name: livekit-config
  namespace: chatto
data:
  # LiveKit substitutes ${VAR} from environment at startup.
  # LIVEKIT_API_SECRET is injected by the livekit Deployment from chatto-config.
  # The key name "chatto" must match CHATTO_LIVEKIT_API_KEY in secret.yaml.
  # use_external_ip is disabled — all media is relayed through the TURN server
  # over the signaling WebSocket (no direct UDP/TCP ports exposed).
  livekit.yaml: |
    port: 7880
    rtc:
      use_external_ip: false
      force_relay: true
    turn:
      enabled: true
      tls_port: 5349
      domain: livekit.chat.chronobyte.net
      cert_file: ""
      key_file: ""
    keys:
      chatto: ${LIVEKIT_API_SECRET}
    webhook:
      urls:
        - https://chat.chronobyte.net/webhooks/livekit
      api_key: chatto
    logging:
      level: info
