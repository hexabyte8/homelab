# IMPORTANT: This is a PLACEHOLDER shell. Never commit real credentials to git.
#
# Populate or rotate credentials with kubectl patch (NOT apply/create):
#
#   kubectl patch secret operator-oauth -n tailscale \
#     -p '{"stringData":{"client_id":"<ID>","client_secret":"<SECRET>"}}'
#
# Using patch avoids touching the last-applied-configuration annotation,
# which prevents ArgoCD's strategic merge from overwriting the values.
#
# To create the OAuth client:
#   1. https://login.tailscale.com/admin/settings/oauth
#   2. Scopes: devices (write) — Tag: tag:k8s-operator
apiVersion: v1
kind: Secret
metadata:
  name: operator-oauth
  namespace: tailscale
type: Opaque
# No data here intentionally — ArgoCD ignoreDifferences protects this secret.
# Populate manually:
#   kubectl create secret generic operator-oauth -n tailscale \
#     --from-literal=client_id=<ID> --from-literal=client_secret=<SECRET> \
#     --dry-run=client -o yaml | kubectl apply -f -
