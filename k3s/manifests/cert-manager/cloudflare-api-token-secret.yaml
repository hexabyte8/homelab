# Placeholder Secret — real value is patched live by the
# `.github/workflows/k3s-patch-secrets.yml` workflow via Bitwarden Secrets Manager.
# Run that workflow with target `cert-manager-cloudflare-token` (or `all`) after
# a fresh apply or credential rotation.
#
# Required Bitwarden secret UUID:
#   e46f58e9-d6d4-429f-8ce1-b40f00ca046c  CLOUDFLARE_API_TOKEN
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
type: Opaque
stringData:
  api-token: "REPLACE_ME"
