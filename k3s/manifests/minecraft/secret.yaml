# Placeholder Secret for Minecraft RCON password.
#
# DO NOT commit real credentials to source control.
#
# This Secret holds a REPLACE_ME placeholder only. The real value is patched
# in-cluster live by the `.github/workflows/k3s-patch-secrets.yml` GitHub
# Actions workflow, which loads it from Bitwarden Secrets Manager. Run that
# workflow with target `minecraft-rcon-password` (or `all`) after a fresh
# apply / disaster recovery / credential rotation.
#
# The `kustomize.toolkit.fluxcd.io/reconcile: disabled` annotation tells
# Flux to leave this object alone after creation so subsequent reconciles
# will not overwrite the live patched value with this placeholder.
#
# Required keys (patched live):
#   RCON_PASSWORD - Password for the RCON console interface
apiVersion: v1
kind: Secret
metadata:
  name: minecraft-secrets
  namespace: minecraft
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
type: Opaque
stringData:
  RCON_PASSWORD: "REPLACE_ME"
