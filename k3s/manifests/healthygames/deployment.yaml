apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthygames
  namespace: healthygames
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: healthygames
  template:
    metadata:
      labels:
        app: healthygames
    spec:
      containers:
        - name: healthygames
          image: ghcr.io/hexabyte8/healthygames:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: data
            - name: data
              mountPath: /app/public/games
              subPath: games
            - name: data
              mountPath: /app/public/covers
              subPath: covers
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: healthygames-data
