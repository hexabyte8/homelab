apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-credentials
  namespace: cloudflared
type: Opaque
stringData:
  # Get token from Cloudflare Zero Trust > Networks > Tunnels > your tunnel > Configure > Docker tab
  # Apply real token with kubectl patch (ArgoCD-safe, won't conflict with field manager):
  #   kubectl patch secret cloudflared-tunnel-credentials -n cloudflared \
  #     --type='merge' -p="{\"data\":{\"tunnel-token\":\"$(echo -n '<YOUR_TOKEN>' | base64 -w0)\"}}"
  tunnel-token: "REPLACE_ME"
