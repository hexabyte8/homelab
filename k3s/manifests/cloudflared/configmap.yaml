apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # Tunnel routing is configured in Cloudflare Zero Trust dashboard
    # Go to: Zero Trust > Networks > Tunnels > your tunnel > Public Hostname
    no-autoupdate: true
    metrics: 0.0.0.0:2000
    # Force HTTP/2 over TCP 443 — QUIC (UDP 7844) is blocked on this network
    protocol: http2
