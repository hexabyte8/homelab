[extend]
useDefault = true

[allowlist]
description = "Global allowlist for documented false positives"
paths = [
  '''(^|/)docs/stalwart-email\.md$''',
]

regexes = [
  '''<[a-zA-Z0-9._/ -]+>''',
  '''bws-uuid-[a-z0-9-]+''',
  '''^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$''',
]
