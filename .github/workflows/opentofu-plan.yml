name: OpenTofu Plan

on:
  workflow_dispatch:

  pull_request:
    branches: [main]
    paths:
      - 'opentofu/**'
      - '.github/workflows/opentofu-*.yml'

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.changed.outputs.stacks }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed stacks
        id: changed
        run: |
          ALL_STACKS='["cloudflare","tailscale","aws","proxmox","authentik"]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stacks=${ALL_STACKS}" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # If any opentofu workflow file changed, run all stacks
          if echo "$CHANGED" | grep -q "^\.github/workflows/opentofu"; then
            echo "Workflow file changed — running all stacks."
            echo "stacks=${ALL_STACKS}" >> $GITHUB_OUTPUT
            exit 0
          fi

          STACKS=$(echo "$CHANGED" \
            | grep "^opentofu/" \
            | cut -d/ -f2 \
            | sort -u \
            | grep -E "^(cloudflare|tailscale|aws|proxmox|authentik)$" \
            | jq -cR -s 'split("\n") | map(select(length > 0))')

          if [ -z "$STACKS" ] || [ "$STACKS" = "[]" ]; then
            echo "No stack directories changed."
            STACKS="[]"
          fi

          echo "stacks=${STACKS}" >> $GITHUB_OUTPUT

  plan:
    needs: detect
    if: needs.detect.outputs.stacks != '[]'
    strategy:
      matrix:
        stack: ${{ fromJson(needs.detect.outputs.stacks) }}
      fail-fast: false
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/opentofu-reusable.yml
    with:
      stack: ${{ matrix.stack }}
      action: plan
    secrets:
      BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
