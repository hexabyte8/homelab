name: OpenTofu Stack (Reusable)

on:
  workflow_call:
    inputs:
      stack:
        description: 'Stack to operate on (cloudflare, tailscale, aws, proxmox, authentik)'
        type: string
        required: true
      action:
        description: 'Action to run (plan or apply)'
        type: string
        required: true
    secrets:
      BW_ACCESS_TOKEN:
        required: true

jobs:
  opentofu:
    runs-on: ubuntu-latest
    environment: ${{ inputs.action == 'apply' && 'production' || '' }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            d2853bd9-e658-4206-a9d4-b43a0186a46a > ADMIN_EMAIL
            73f4bb30-0c41-445c-908e-b43a00ef7863 > AUTHENTIK_API_TOKEN
            efb9a246-29d5-423e-98c4-b40f00cc81a6 > AWS_ACCESS_KEY_ID
            735bb5f9-8a0e-427d-9f55-b40f00cc9c43 > AWS_SECRET_ACCESS_KEY
            ec2857b8-bda5-42d3-89d6-b40f00c84fe6 > CLOUDFLARE_ACCOUNT_ID
            e46f58e9-d6d4-429f-8ce1-b40f00ca046c > CLOUDFLARE_API_TOKEN
            07a9d8f9-56e0-452f-a26e-b40f00c99bed > CLOUDFLARE_ZONE_ID
            3a28cdae-ddf3-439a-8e03-b40f00cb6a92 > CLOUDFLARE_ZONE_NAME
            7285af12-3ae8-40b4-adae-b40f00cfbd6f > DEFAULT_VM_PASSWORD
            4db2229a-7557-413d-a364-b43a0186a1e3 > PEER_PUBLIC_IP
            9a5a848c-a0d3-494c-9a38-b40f00c7c7cb > PM_API_TOKEN_ID
            5604d469-60fd-49fe-978e-b40f00c813d0 > PM_API_TOKEN_SECRET
            5891e733-71fb-43ff-b7c3-b43a01869f45 > PUBLIC_IP
            2ea22c80-a3b2-4b71-a5f7-b40f00c90b84 > TAILSCALE_OAUTH_CLIENT_ID
            9edcc17b-513b-4b4b-848b-b40f00c91c35 > TAILSCALE_OAUTH_CLIENT_SECRET

      # Tailscale is needed for proxmox (API + SSH over MagicDNS) and authentik
      # (Authentik runs on the K3s cluster on Proxmox; its Cloudflare tunnel
      # backend is unreachable when the node is down).
      - name: Setup Tailscale
        if: inputs.stack == 'proxmox' || inputs.stack == 'authentik'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          version: 1.68.1

      - name: Enable MagicDNS
        if: inputs.stack == 'proxmox' || inputs.stack == 'authentik'
        run: sudo tailscale set --accept-dns=true | cat

      - name: Wait for Proxmox DNS
        if: inputs.stack == 'proxmox'
        run: |
          echo "Waiting for chronobyte.daggertooth-scala.ts.net to resolve..."
          for i in $(seq 1 60); do
            if getent hosts chronobyte.daggertooth-scala.ts.net; then
              echo "DNS resolved successfully"
              break
            fi
            echo "Attempt $i/60 failed, retrying in 5s..."
            sleep 5
          done

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: OpenTofu Init
        run: tofu init -no-color
        working-directory: ./opentofu/${{ inputs.stack }}
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: OpenTofu Plan
        if: inputs.action == 'plan'
        id: plan
        run: |
          tofu plan -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        working-directory: ./opentofu/${{ inputs.stack }}
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_admin_email: ${{ env.ADMIN_EMAIL }}
          TF_VAR_authentik_api_token: ${{ env.AUTHENTIK_API_TOKEN }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_cloudflare_account_id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ env.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_zone_name: ${{ env.CLOUDFLARE_ZONE_NAME }}
          TF_VAR_default_vm_password: ${{ env.DEFAULT_VM_PASSWORD }}
          TF_VAR_proxmox_host: "chronobyte"
          TF_VAR_public_ip: ${{ env.PUBLIC_IP }}
          TF_VAR_s3_backup_bucket_name: ${{ vars.S3_BACKUP_BUCKET_NAME }}

      - name: Comment Plan on PR
        uses: actions/github-script@v9
        if: inputs.action == 'plan' && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('./opentofu/${{ inputs.stack }}/plan.txt', 'utf8');
            const truncatedPlan = plan.length > 65000 ? plan.substring(0, 65000) + '\n... (truncated)' : plan;
            const output = `#### OpenTofu Plan — \`${{ inputs.stack }}\`

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncatedPlan}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if Plan Failed
        if: inputs.action == 'plan' && steps.plan.outputs.exitcode != '0'
        run: exit 1

      - name: OpenTofu Apply
        if: inputs.action == 'apply'
        run: tofu apply -auto-approve -no-color
        working-directory: ./opentofu/${{ inputs.stack }}
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_admin_email: ${{ env.ADMIN_EMAIL }}
          TF_VAR_authentik_api_token: ${{ env.AUTHENTIK_API_TOKEN }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_cloudflare_account_id: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_zone_id: ${{ env.CLOUDFLARE_ZONE_ID }}
          TF_VAR_cloudflare_zone_name: ${{ env.CLOUDFLARE_ZONE_NAME }}
          TF_VAR_default_vm_password: ${{ env.DEFAULT_VM_PASSWORD }}
          TF_VAR_proxmox_host: "chronobyte"
          TF_VAR_public_ip: ${{ env.PUBLIC_IP }}
          TF_VAR_s3_backup_bucket_name: ${{ vars.S3_BACKUP_BUCKET_NAME }}
