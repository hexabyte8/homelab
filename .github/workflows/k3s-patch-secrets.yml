name: k3s - Patch Cluster Secrets

# Re-applies the Kubernetes Secrets that are patched live (not stored in git)
# so Flux's `kustomize.toolkit.fluxcd.io/reconcile=disabled` annotation can
# preserve them. Run this whenever the live values are wiped (e.g. after a
# disaster-recovery rebuild) or when rotating credentials.
#
# Each Secret is patched independently — pick one or "all" via the input.
# Secret values come from Bitwarden Secrets Manager via the
# `load-bitwarden-secrets` composite action; UUIDs live in
# `.github/secrets-manifest.yml`.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Which secret(s) to patch'
        required: true
        type: choice
        default: all
        options:
          - all
          - authentik-credentials
          - cert-manager-letsencrypt-email
          - cloudflared-tunnel-credentials
          - mcp-proxmox-secrets
          - stalwart-secrets
          - tailscale-operator-oauth
          - transmission-openvpn-credentials
      target_host:
        description: 'k3s server hostname (used to fetch kubeconfig)'
        required: true
        type: string
        default: 'k3s-server'

jobs:
  patch-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load secrets from Bitwarden
        uses: bitwarden/sm-action@v4
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            d2853bd9-e658-4206-a9d4-b43a0186a46a > ADMIN_EMAIL
            73e12b92-3483-4e71-a0ca-b43a00de4275 > AUTHENTIK_BOOTSTRAP_EMAIL
            7c78db78-67fb-447c-83ea-b43a00de1ecc > AUTHENTIK_BOOTSTRAP_PASSWORD
            fad8a44d-352f-4fcc-b63b-b43a00e06027 > AUTHENTIK_SECRET_KEY
            793deec1-de4b-487b-b685-b43a00e06099 > AUTHENTIK_SMTP_PASSWORD
            3289b15b-f52c-45aa-8b9f-b41600f5e14f > CLOUDFLARE_TUNNEL_TOKEN
            9a5a848c-a0d3-494c-9a38-b40f00c7c7cb > PM_API_TOKEN_ID
            5604d469-60fd-49fe-978e-b40f00c813d0 > PM_API_TOKEN_SECRET
            4c9aa2a6-aa46-4fed-bac8-b43a00e06fd8 > PROXMOX_HOST
            6e047103-0d0d-40ff-8255-b43a00e06e68 > STALWART_ADMIN_PASSWORD
            4f8db3c6-416a-412d-9f6f-b4160169641f > STALWART_RESEND_API_KEY
            2ea22c80-a3b2-4b71-a5f7-b40f00c90b84 > TAILSCALE_OAUTH_CLIENT_ID
            9edcc17b-513b-4b4b-848b-b40f00c91c35 > TAILSCALE_OAUTH_CLIENT_SECRET
            1947c5ba-f6b7-4db6-8c9b-b43a0186a989 > TRANSMISSION_OVPN
            ae81ed73-294c-4d5f-aa65-b43a0186aeb8 > TRANSMISSION_RPC_PASSWORD
            4e132d2b-cd68-4c7e-9f56-b43a0186ac21 > TRANSMISSION_RPC_USERNAME
      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          cat .ssh/known_hosts >> ~/.ssh/known_hosts

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          version: 1.68.1

      - name: Enable MagicDNS
        run: sudo tailscale set --accept-dns=true | cat

      - name: Wait for DNS to be available
        run: sleep 10

      - name: Get kubeconfig from k3s server
        run: |
          mkdir -p ~/.kube && chmod 700 ~/.kube
          ssh ubuntu@${{ inputs.target_host }}.daggertooth-scala.ts.net \
            "sudo cat /etc/rancher/k3s/k3s.yaml" \
            | sed 's/127\.0\.0\.1/${{ inputs.target_host }}.daggertooth-scala.ts.net/g' \
            | sed 's/certificate-authority-data:.*/insecure-skip-tls-verify: true/' \
            > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Patch tailscale/operator-oauth
        if: inputs.target == 'all' || inputs.target == 'tailscale-operator-oauth'
        env:
          CLIENT_ID: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          CLIENT_SECRET: ${{ env.TAILSCALE_OAUTH_CLIENT_SECRET }}
        run: |
          kubectl patch secret operator-oauth -n tailscale --type=merge -p "$(jq -nc \
            --arg id "$CLIENT_ID" --arg secret "$CLIENT_SECRET" \
            '{stringData: {client_id: $id, client_secret: $secret}}')"

      - name: Patch cloudflared/cloudflared-tunnel-credentials
        if: inputs.target == 'all' || inputs.target == 'cloudflared-tunnel-credentials'
        env:
          TUNNEL_TOKEN: ${{ env.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          kubectl patch secret cloudflared-tunnel-credentials -n cloudflared \
            --type=merge -p "$(jq -nc --arg t "$TUNNEL_TOKEN" \
              '{stringData: {"tunnel-token": $t}}')"

      - name: Patch authentik/authentik-credentials
        if: inputs.target == 'all' || inputs.target == 'authentik-credentials'
        env:
          SECRET_KEY: ${{ env.AUTHENTIK_SECRET_KEY }}
          BOOTSTRAP_PASSWORD: ${{ env.AUTHENTIK_BOOTSTRAP_PASSWORD }}
          BOOTSTRAP_EMAIL: ${{ env.AUTHENTIK_BOOTSTRAP_EMAIL }}
          SMTP_PASSWORD: ${{ env.AUTHENTIK_SMTP_PASSWORD }}
        run: |
          kubectl patch secret authentik-credentials -n authentik --type=merge -p "$(jq -nc \
            --arg sk "$SECRET_KEY" \
            --arg bp "$BOOTSTRAP_PASSWORD" \
            --arg be "$BOOTSTRAP_EMAIL" \
            --arg smtp "$SMTP_PASSWORD" \
            '{stringData: {"secret-key": $sk, "bootstrap-password": $bp, "bootstrap-email": $be, "smtp-password": $smtp}}')"

      - name: Patch stalwart/stalwart-secrets
        if: inputs.target == 'all' || inputs.target == 'stalwart-secrets'
        env:
          ADMIN_PASSWORD: ${{ env.STALWART_ADMIN_PASSWORD }}
          RESEND_API_KEY: ${{ env.STALWART_RESEND_API_KEY }}
        run: |
          kubectl patch secret stalwart-secrets -n stalwart --type=merge -p "$(jq -nc \
            --arg ap "$ADMIN_PASSWORD" --arg rk "$RESEND_API_KEY" \
            '{stringData: {"admin-password": $ap, "resend-api-key": $rk}}')"

      - name: Patch mcp-proxmox/mcp-proxmox-secrets
        if: inputs.target == 'all' || inputs.target == 'mcp-proxmox-secrets'
        env:
          PM_TOKEN_ID: ${{ env.PM_API_TOKEN_ID }}
          PM_TOKEN_SECRET: ${{ env.PM_API_TOKEN_SECRET }}
          PM_HOST: ${{ env.PROXMOX_HOST }}
        run: |
          # PM_API_TOKEN_ID is in the form "user@realm!token_name". Split it.
          PM_USER="${PM_TOKEN_ID%%!*}"
          PM_TOKEN_NAME="${PM_TOKEN_ID##*!}"

          CONFIG_JSON=$(jq -nc \
            --arg host "$PM_HOST" \
            --arg user "$PM_USER" \
            --arg name "$PM_TOKEN_NAME" \
            --arg value "$PM_TOKEN_SECRET" \
            '{
              proxmox: {host: $host, port: 8006, verify_ssl: false, service: "PVE"},
              auth: {user: $user, token_name: $name, token_value: $value},
              logging: {level: "INFO", format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"},
              mcp: {host: "0.0.0.0", port: 8811, transport: "STREAMABLE"},
              security: {dev_mode: true},
              jobs: {sqlite_path: "/tmp/proxmox-jobs.sqlite3"}
            }')

          kubectl patch secret mcp-proxmox-secrets -n mcp-proxmox --type=merge -p "$(jq -nc \
            --arg cfg "$CONFIG_JSON" '{stringData: {"config.json": $cfg}}')"

      - name: Patch jellyfin/transmission-openvpn-credentials
        if: inputs.target == 'all' || inputs.target == 'transmission-openvpn-credentials'
        env:
          OVPN: ${{ env.TRANSMISSION_OVPN }}
          RPC_USERNAME: ${{ env.TRANSMISSION_RPC_USERNAME }}
          RPC_PASSWORD: ${{ env.TRANSMISSION_RPC_PASSWORD }}
        run: |
          kubectl patch secret transmission-openvpn-credentials -n jellyfin \
            --type=merge -p "$(jq -nc \
              --arg ovpn "$OVPN" \
              --arg user "$RPC_USERNAME" \
              --arg pass "$RPC_PASSWORD" \
              '{stringData: {"vpn.ovpn": $ovpn, TRANSMISSION_RPC_USERNAME: $user, TRANSMISSION_RPC_PASSWORD: $pass}}')"

      - name: Patch cert-manager/letsencrypt-production email
        if: inputs.target == 'all' || inputs.target == 'cert-manager-letsencrypt-email'
        env:
          ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
        run: |
          kubectl patch clusterissuer letsencrypt-production --type=merge -p "$(jq -nc --arg e "$ADMIN_EMAIL" '{spec: {acme: {email: $e}}}')"

      - name: Verify reconcile=disabled annotation on patched secrets
        if: always()
        run: |
          # These annotations should already be in place from the migration,
          # but confirm. Without them Flux will overwrite our patched values
          # on the next reconcile of the parent Kustomization.
          for s in \
              "authentik authentik-credentials" \
              "cloudflared cloudflared-tunnel-credentials" \
              "mcp-proxmox mcp-proxmox-secrets" \
              "stalwart stalwart-secrets" \
              "tailscale operator-oauth" \
              "jellyfin transmission-openvpn-credentials"; do
            set -- $s
            kubectl annotate secret "$2" -n "$1" \
              kustomize.toolkit.fluxcd.io/reconcile=disabled --overwrite
          done
          # ClusterIssuer is cluster-scoped (no namespace)
          kubectl annotate clusterissuer letsencrypt-production \
            kustomize.toolkit.fluxcd.io/reconcile=disabled --overwrite
