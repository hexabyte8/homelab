name: Ansible - Run Backup Now

on:
  workflow_dispatch:
    inputs:
      target_host:
        description: 'Target host from Tailscale inventory (e.g., game-server)'
        required: true
        type: string
        default: 'game-server'
      backup_name:
        description: 'Backup job name to run (e.g. minecraft)'
        required: true
        type: string
        default: 'minecraft'
      archive_prefix:
        description: 'Optional archive prefix set when the backup was deployed (e.g. "homestead"). When set, S3 verification lists from the root of the bucket filtered by this prefix instead of a named subfolder.'
        required: false
        type: string
        default: ''

jobs:
  run-backup:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load secrets from Bitwarden
        uses: bitwarden/sm-action@v4
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            efb9a246-29d5-423e-98c4-b40f00cc81a6 > AWS_ACCESS_KEY_ID
            735bb5f9-8a0e-427d-9f55-b40f00cc9c43 > AWS_SECRET_ACCESS_KEY
            2ea22c80-a3b2-4b71-a5f7-b40f00c90b84 > TAILSCALE_OAUTH_CLIENT_ID
            9edcc17b-513b-4b4b-848b-b40f00c91c35 > TAILSCALE_OAUTH_CLIENT_SECRET
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci
          version: 1.68.1

      - name: Enable MagicDNS
        run: sudo tailscale set --accept-dns=true | cat

      - name: Wait for DNS to be available
        run: |
          echo "Waiting for Tailscale DNS to be ready..."
          sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      - name: Create inventory
        run: |
          cat > ansible/inventory.yml <<EOF
          ---
          all:
            children:
              gameserver:
                hosts:
                  ${{ inputs.target_host }}:
                    ansible_host: ${{ inputs.target_host }}.daggertooth-scala.ts.net
                    ansible_user: ubuntu
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
                vars:
                  ansible_python_interpreter: /usr/bin/python3
          EOF

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan ${{ inputs.target_host }}.daggertooth-scala.ts.net >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Run backup now
        run: |
          cd ansible
          ansible-playbook playbooks/run_s3_backup.yml
        env:
          BACKUP_NAME: ${{ inputs.backup_name }}

      - name: Generate run summary
        if: always()
        run: |
          echo "## Backup Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Host** | \`${{ inputs.target_host }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backup name** | \`${{ inputs.backup_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 bucket** | \`${{ vars.S3_BACKUP_BUCKET_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**To view backup logs on the server:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "sudo journalctl -u s3-backup-${{ inputs.backup_name }}.service -n 100 --no-pager" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: List recent S3 backups (verify upload)
        run: |
          if [ -n "${{ inputs.archive_prefix }}" ]; then
            S3_PATH="s3://${{ vars.S3_BACKUP_BUCKET_NAME }}/${{ inputs.archive_prefix }}"
            LABEL="s3://${{ vars.S3_BACKUP_BUCKET_NAME }}/ (prefix: ${{ inputs.archive_prefix }})"
          else
            S3_PATH="s3://${{ vars.S3_BACKUP_BUCKET_NAME }}/${{ inputs.backup_name }}/"
            LABEL="s3://${{ vars.S3_BACKUP_BUCKET_NAME }}/${{ inputs.backup_name }}/"
          fi
          echo "## S3 Contents — \`${LABEL}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          set +e
          output=$(aws s3 ls "$S3_PATH" \
            --recursive --human-readable 2>&1)
          exit_code=$?
          if [ $exit_code -eq 0 ] && [ -z "$output" ]; then
            echo "(bucket prefix is empty — backup may have uploaded to an unexpected path)" | tee -a $GITHUB_STEP_SUMMARY
          elif [ $exit_code -ne 0 ]; then
            echo "$output" | tee -a $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "(aws s3 ls failed — check AWS credentials, bucket name, and region)" | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "$output" | tee -a $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
