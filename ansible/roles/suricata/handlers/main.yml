---
- name: Restart suricata
  ansible.builtin.systemd:
    name: suricata
    state: restarted
    daemon_reload: true

- name: Reload suricata rules
  ansible.builtin.command:
    cmd: suricatasc -c reload-rules
  changed_when: true

- name: Restart promtail
  ansible.builtin.systemd:
    name: promtail
    state: restarted
    daemon_reload: true
